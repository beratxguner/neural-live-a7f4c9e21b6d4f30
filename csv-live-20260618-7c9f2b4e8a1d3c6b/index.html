<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSV Live Probe</title>
  <style>
    :root { color-scheme: light; --fg:#111827; --muted:#6b7280; --line:#e5e7eb; --soft:#f8fafc; --accent:#2563eb; --risk:#dc2626; --ok:#047857; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif; background:#fff; color:var(--fg); }
    header { border-bottom:1px solid var(--line); padding:18px 22px; display:flex; justify-content:space-between; gap:16px; align-items:center; position:sticky; top:0; background:#fff; z-index:2; }
    h1 { font-size:18px; margin:0; letter-spacing:0; }
    .sub { color:var(--muted); font-size:13px; margin-top:4px; }
    main { padding:18px 22px 28px; max-width:1420px; margin:0 auto; }
    .grid { display:grid; grid-template-columns:repeat(6, minmax(120px, 1fr)); gap:10px; }
    .metric { border:1px solid var(--line); border-radius:8px; padding:12px; background:var(--soft); min-height:76px; }
    .label { color:var(--muted); font-size:12px; }
    .value { font-size:22px; font-weight:700; margin-top:4px; overflow-wrap:anywhere; }
    .panel { border:1px solid var(--line); border-radius:8px; margin-top:14px; overflow:hidden; }
    .panel h2 { font-size:14px; margin:0; padding:12px 14px; border-bottom:1px solid var(--line); background:#f9fafb; }
    .current { padding:14px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .reasoning { font-size:16px; line-height:1.5; border-left:4px solid var(--accent); padding:10px 12px; background:#f8fafc; border-radius:6px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { border-bottom:1px solid var(--line); padding:9px 10px; text-align:left; vertical-align:top; }
    th { color:#374151; background:#f9fafb; font-weight:600; position:sticky; top:74px; z-index:1; }
    td.reason { min-width:360px; }
    .bar { height:10px; border-radius:999px; background:#e5e7eb; overflow:hidden; margin-top:9px; }
    .fill { height:100%; background:linear-gradient(90deg, #2563eb, #059669); width:0%; }
    .risk { color:var(--risk); font-weight:700; }
    .ok { color:var(--ok); font-weight:700; }
    .muted { color:var(--muted); }
    @media (max-width: 980px) { .grid { grid-template-columns:repeat(2, 1fr); } .current { grid-template-columns:1fr; } th { position:static; } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CSV Live Probe</h1>
      <div class="sub">experiment_01.csv satırları modele 3 saniyede bir gönderiliyor</div>
    </div>
    <div class="sub" id="updated">Bekleniyor</div>
  </header>
  <main>
    <section class="grid">
      <div class="metric"><div class="label">Durum</div><div class="value" id="state">-</div></div>
      <div class="metric"><div class="label">Satır</div><div class="value" id="row">-</div></div>
      <div class="metric"><div class="label">Progress</div><div class="value" id="progress">-</div><div class="bar"><div class="fill" id="fill"></div></div></div>
      <div class="metric"><div class="label">Action</div><div class="value" id="action">-</div></div>
      <div class="metric"><div class="label">Reasoning</div><div class="value" id="reasoningClass">-</div></div>
      <div class="metric"><div class="label">Failure</div><div class="value" id="failure">-</div></div>
    </section>
    <section class="panel">
      <h2>Canlı Karar</h2>
      <div class="current">
        <div>
          <div class="label">Model reasoning</div>
          <div class="reasoning" id="reasoningText">Henüz sonuç yok.</div>
        </div>
        <div>
          <div class="label">Özet telemetri</div>
          <table><tbody id="features"></tbody></table>
        </div>
      </div>
    </section>
    <section class="panel">
      <h2>Geçmiş Yanıtlar</h2>
      <table>
        <thead><tr><th>Row</th><th>Process</th><th>Action</th><th>Reasoning</th><th>Failure</th><th>Downtime</th><th>Text</th></tr></thead>
        <tbody id="history"></tbody>
      </table>
    </section>
  </main>
  <script>
    const fmt = (v, digits=3) => (v === null || v === undefined || Number.isNaN(Number(v))) ? "-" : Number(v).toFixed(digits);
    async function refresh() {
      try {
        const res = await fetch("status.json?ts=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("status " + res.status);
        const data = await res.json();
        const c = data.current || {};
        document.getElementById("updated").textContent = "Güncelleme: " + (data.updated_at || "-");
        document.getElementById("state").textContent = data.state || "-";
        document.getElementById("row").textContent = `${data.row || 0} / ${data.total_rows || 0}`;
        document.getElementById("progress").textContent = `${fmt(data.progress_pct, 2)}%`;
        document.getElementById("fill").style.width = `${Math.max(0, Math.min(100, Number(data.progress_pct || 0)))}%`;
        document.getElementById("action").textContent = c.action || "-";
        document.getElementById("reasoningClass").textContent = c.reasoning_class || "-";
        document.getElementById("failure").textContent = fmt(c.failure_probability, 3);
        document.getElementById("reasoningText").textContent = c.reasoning_text || "Henüz sonuç yok.";
        const features = c.features || {};
        document.getElementById("features").innerHTML = Object.entries(features).slice(0, 14).map(([k,v]) => `<tr><td class="muted">${k}</td><td>${fmt(v, 5)}</td></tr>`).join("");
        const hist = data.history || [];
        document.getElementById("history").innerHTML = hist.map(r => {
          const riskClass = Number(r.failure_probability || 0) >= 0.6 ? "risk" : "ok";
          return `<tr><td>${r.row}</td><td>${r.machining_process || "-"}</td><td>${r.action || "-"}</td><td>${r.reasoning_class || "-"}</td><td class="${riskClass}">${fmt(r.failure_probability, 3)}</td><td>${fmt(r.downtime_minutes, 3)}</td><td class="reason">${r.reasoning_text || ""}</td></tr>`;
        }).join("");
      } catch (err) {
        document.getElementById("updated").textContent = "Bağlantı bekleniyor";
      }
    }
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
